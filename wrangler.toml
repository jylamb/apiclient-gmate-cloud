name = "apiclient-gmate-cloud"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# CLIENT_SECRET 은 Cloudflare Dashboard 의 "변수 및 암호" → 비밀(암호화) 변수로 별도 등록.
# (wrangler.toml 에 노출하지 않음. wrangler.toml 은 git tracked)

# 기본(preview) — 로컬 dev 시 사용
[vars]
API_BASE_URL = "http://localhost:8080"
